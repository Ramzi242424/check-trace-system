<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS - Device Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Система проверки CTS</h2>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div id="reader" style="width: 100%"></div> <div class="mt-3">
                            <label class="form-label">Введите IMEI вручную</label>
                            <input type="text" id="imeiInput" class="form-control form-control-lg" placeholder="15 цифр">
                            <div id="feedback" class="form-text"></div>
                        </div>
                        
                        <button id="checkBtn" class="btn btn-primary w-100 mt-3 btn-lg">Проверить устройство</button>
                    </div>
                </div>
                
                <div id="resultArea" class="mt-4"></div> </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
