<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CTS - Mobile Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body p-0">
                        <div id="reader" style="width: 100%; min-height: 300px; background: #000;"></div>
                    </div>
                    <div class="card-footer bg-white border-0 d-flex justify-content-between">
                        <button id="startBtn" class="btn btn-success btn-sm">Включить камеру</button>
                        <button id="stopBtn" class="btn btn-danger btn-sm" disabled>Выключить</button>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Результат сканирования / Ввод</label>
                            <input type="number" id="imeiInput" class="form-control form-control-lg text-center" placeholder="15-значный IMEI">
                            <div id="feedback" class="form-text mt-2 text-center"></div>
                        </div>
                        
                        <button id="checkBtn" class="btn btn-primary w-100 btn-lg shadow-sm">
                            Проверить и Сохранить
                        </button>
                    </div>
                </div>

                <div id="resultArea" class="mt-3"></div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
